<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#0d1117"/>
  <title>Portes Vlissingen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#0d1117;--card:#161b22;--card2:#1c2230;--border:#30363d;
      --amber:#f0a500;--amber2:#fbbf24;--text:#e6edf3;--muted:#7d8590;
      --err:#f85149;--ok:#3fb950;--info:#58a6ff;
      --font-h:'Barlow Condensed',sans-serif;--font-b:'Barlow',sans-serif;
    }
    html,body{height:100%;background:var(--bg)}
    #root{min-height:100vh}
    .app{min-height:100vh;background:var(--bg);font-family:var(--font-b);color:var(--text);font-size:15px}
    .hdr{background:var(--card);border-bottom:2px solid var(--amber);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99}
    .logo{font-family:var(--font-h);font-weight:800;font-size:20px;letter-spacing:2px;color:var(--amber)}
    .logo b{color:var(--text);font-weight:800}
    .hdr-right{display:flex;align-items:center;gap:8px}
    .sync-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .sync-dot.ok{background:var(--ok)}.sync-dot.err{background:var(--err)}.sync-dot.idle{background:var(--muted)}.sync-dot.loading{background:var(--amber);animation:pulse 1s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

    .body{padding:18px;max-width:520px;margin:0 auto;padding-bottom:90px}
    .banner{border-radius:10px;padding:10px 14px;font-size:12px;margin-bottom:0;text-align:center}
    .banner.warn{background:rgba(240,165,0,.08);border:1px solid rgba(240,165,0,.25);color:var(--amber)}
    .banner.info{background:rgba(88,166,255,.08);border:1px solid rgba(88,166,255,.25);color:var(--info)}
    .banner.ok{background:rgba(63,185,80,.08);border:1px solid rgba(63,185,80,.25);color:var(--ok)}

    .sec{margin-bottom:26px}
    .sec-ttl{font-family:var(--font-h);font-weight:700;font-size:12px;letter-spacing:3px;color:var(--amber);text-transform:uppercase;margin-bottom:13px;display:flex;align-items:center;gap:9px}
    .sec-ttl::before{content:'';display:block;width:3px;height:16px;background:var(--amber);border-radius:2px;flex-shrink:0}
    .fld{margin-bottom:14px}
    .fld label{display:block;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:5px}
    .fld input,.fld select,.fld textarea{width:100%;background:var(--card2);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:var(--font-b);font-size:15px;outline:none;transition:border-color .2s;-webkit-appearance:none;appearance:none}
    .fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--amber)}
    .fld input.er,.fld select.er{border-color:var(--err)}
    .fld textarea{resize:vertical;min-height:90px;line-height:1.5}
    .fld select option{background:#1c2230}
    .emsg{color:var(--err);font-size:11px;margin-top:5px;display:flex;align-items:center;gap:4px}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
    .tag{display:inline-block;background:rgba(88,166,255,.1);color:var(--info);border:1px solid rgba(88,166,255,.25);border-radius:5px;padding:2px 8px;font-size:11px;font-family:var(--font-h);font-weight:600;letter-spacing:.5px;margin-left:6px}

    /* ── Bloque conductor ── */
    .cond-block{border-radius:12px;overflow:hidden;border:1.5px solid var(--border);transition:border-color .3s}
    .cond-block.valid{border-color:var(--ok)}
    .cond-block.error{border-color:var(--err)}
    .cond-top{display:flex;align-items:center;background:var(--card2)}
    .cond-lbl-col{width:72px;flex-shrink:0;padding:0 14px;font-family:var(--font-h);font-weight:700;font-size:11px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;border-right:1px solid var(--border);display:flex;align-items:center;height:52px}
    .cond-input{flex:1;background:transparent;border:none;padding:13px 14px;color:var(--text);font-family:var(--font-h);font-weight:700;font-size:20px;letter-spacing:3px;outline:none;text-transform:uppercase;width:100%}
    .cond-state{width:40px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px}
    .cond-bottom{border-top:1px solid var(--border);padding:12px 14px;display:flex;align-items:center;gap:10px;min-height:52px;background:var(--card2)}
    .cond-avatar{width:32px;height:32px;border-radius:50%;background:rgba(240,165,0,.15);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
    .cond-name{font-size:15px;font-weight:600;color:var(--text)}
    .cond-name.empty{color:var(--muted);font-weight:400;font-size:13px}
    .cond-code-badge{margin-left:auto;font-family:var(--font-h);font-size:12px;color:var(--ok);background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.3);border-radius:5px;padding:2px 8px;letter-spacing:1px;flex-shrink:0}

    /* ── Picks ── */
    .pick-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    .pick-col{display:grid;grid-template-columns:1fr;gap:9px}
    .pick{background:var(--card2);border:1.5px solid var(--border);border-radius:10px;padding:13px 14px;text-align:center;cursor:pointer;transition:all .18s;user-select:none}
    .pick:active{transform:scale(.97)}
    .pick.on{border-color:var(--amber);background:rgba(240,165,0,.1)}
    .pick-lbl{font-family:var(--font-h);font-weight:700;font-size:15px;letter-spacing:.5px}
    .pick-sub{font-size:11px;color:var(--muted);margin-top:2px}

    /* ── Tipo badge (fijo, no clicable) ── */
    .tipo-badge{background:rgba(240,165,0,.06);border:1.5px solid rgba(240,165,0,.35);border-radius:10px;padding:13px 16px;display:flex;align-items:center;gap:12px}
    .tipo-badge-ic{font-size:22px}
    .tipo-badge-lbl{font-family:var(--font-h);font-weight:800;font-size:17px;letter-spacing:1px;color:var(--amber)}
    .tipo-badge-sub{font-size:11px;color:var(--muted);margin-top:2px}

    /* ── Reference ── */
    .ref-wrap{display:flex;background:var(--card2);border:1.5px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color .2s}
    .ref-wrap.foc{border-color:var(--amber)}.ref-wrap.er{border-color:var(--err)}
    .ref-pfx{padding:12px 13px;background:rgba(240,165,0,.12);color:var(--amber2);font-family:var(--font-h);font-weight:700;font-size:16px;border-right:1px solid var(--border);white-space:nowrap;display:flex;align-items:center}
    .ref-wrap input{border:none;border-radius:0;background:transparent;flex:1;min-width:0;padding:12px 14px;color:var(--text);font-family:var(--font-b);font-size:15px;outline:none}
    .ref-hint{font-size:11px;color:var(--muted);margin-top:4px}
    .char-c{font-size:11px;color:var(--muted);margin-top:3px;text-align:right}

    /* ── CMR ── */
    .cmr{border:2px dashed var(--border);border-radius:12px;padding:26px 16px;text-align:center;cursor:pointer;transition:all .2s}
    .cmr:hover,.cmr.on{border-color:var(--amber);background:rgba(240,165,0,.04)}
    .cmr.er{border-color:var(--err)}
    .cmr-ic{font-size:32px;margin-bottom:8px}
    .cmr-tx{color:var(--muted);font-size:13px;line-height:1.5}
    .cmr-nm{color:var(--amber2);font-weight:600;margin-top:7px;font-size:13px;word-break:break-all}
    .clr-btn{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;margin-top:7px;padding:0;font-family:var(--font-b)}
    .clr-btn:hover{color:var(--err)}

    /* ── Botones principales ── */
    .sub-btn{width:100%;background:var(--amber);color:#000;font-family:var(--font-h);font-weight:800;font-size:19px;letter-spacing:2px;padding:17px;border:none;border-radius:13px;cursor:pointer;transition:all .2s;text-transform:uppercase}
    .sub-btn:hover{background:var(--amber2)}.sub-btn:disabled{opacity:.45;cursor:not-allowed}
    .new-btn{width:100%;background:var(--amber);color:#000;font-family:var(--font-h);font-weight:800;font-size:17px;letter-spacing:2px;padding:17px;border:none;border-radius:13px;cursor:pointer}

    /* ── Success screen ── */
    .suc-body{padding:36px 22px;max-width:480px;margin:0 auto;text-align:center}
    .suc-ic{font-size:60px;margin-bottom:16px}
    .suc-ttl{font-family:var(--font-h);font-weight:800;font-size:30px;letter-spacing:2px;color:var(--ok);margin-bottom:10px}
    .suc-sub{color:var(--muted);margin-bottom:26px;font-size:14px;line-height:1.6}
    .suc-data{background:var(--card);border-radius:13px;padding:18px;text-align:left;margin-bottom:28px;border:1px solid var(--border)}
    .suc-row{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;gap:8px}
    .suc-row:last-child{border-bottom:none}
    .suc-k{color:var(--muted);flex-shrink:0}
    .suc-v{font-weight:600;text-align:right;word-break:break-all}

    /* ── Autocomplete ── */
    .ac-wrap{position:relative}
    .ac-drop{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--card2);border:1.5px solid var(--amber);border-radius:10px;z-index:200;max-height:220px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.5)}
    .ac-item{padding:12px 14px;cursor:pointer;font-size:15px;font-family:var(--font-b);transition:background .12s}
    .ac-item:hover,.ac-item.hi{background:rgba(240,165,0,.13);color:var(--amber2)}
    .ac-item:not(:last-child){border-bottom:1px solid var(--border)}
    .ac-empty{padding:12px 14px;font-size:13px;color:var(--muted);font-style:italic}

    /* ── Botón header mis registros ── */
    .hdr-btn{background:rgba(240,165,0,.12);border:1px solid rgba(240,165,0,.35);color:var(--amber);font-family:var(--font-h);font-weight:700;font-size:13px;letter-spacing:1px;padding:6px 12px;border-radius:8px;cursor:pointer;transition:all .18s}
    .hdr-btn:hover{background:rgba(240,165,0,.22)}

    /* ── Login screen ── */
    .login-body{padding:40px 22px;max-width:380px;margin:0 auto}
    .login-ic{font-size:48px;text-align:center;margin-bottom:16px}
    .login-ttl{font-family:var(--font-h);font-weight:800;font-size:26px;letter-spacing:2px;color:var(--amber);text-align:center;margin-bottom:6px}
    .login-sub{color:var(--muted);font-size:13px;text-align:center;margin-bottom:32px;line-height:1.5}
    .pin-wrap{display:flex;background:var(--card2);border:1.5px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color .2s}
    .pin-wrap.foc{border-color:var(--amber)}
    .pin-wrap.er{border-color:var(--err)}
    .pin-pfx{padding:12px 13px;background:rgba(240,165,0,.12);color:var(--amber2);font-family:var(--font-h);font-weight:700;font-size:14px;border-right:1px solid var(--border);white-space:nowrap;display:flex;align-items:center}
    .pin-wrap input{border:none;border-radius:0;background:transparent;flex:1;min-width:0;padding:12px 14px;color:var(--text);font-family:var(--font-h);font-size:22px;letter-spacing:6px;outline:none}
    .login-err{background:rgba(248,81,73,.08);border:1px solid rgba(248,81,73,.3);color:var(--err);border-radius:8px;padding:10px 14px;font-size:13px;text-align:center;margin-top:14px}

    /* ── Mis registros screen ── */
    .mreg-body{padding:18px;max-width:700px;margin:0 auto;padding-bottom:60px}
    .mreg-welcome{background:var(--card);border-radius:12px;padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:12px;border:1px solid var(--border)}
    .mreg-avatar{width:40px;height:40px;border-radius:50%;background:rgba(240,165,0,.15);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
    .mreg-nombre{font-weight:600;font-size:15px}
    .mreg-sub{font-size:12px;color:var(--muted);margin-top:2px}
    .mreg-logout{margin-left:auto;background:none;border:1px solid var(--border);color:var(--muted);font-size:12px;padding:5px 10px;border-radius:6px;cursor:pointer;font-family:var(--font-b)}
    .mreg-logout:hover{border-color:var(--err);color:var(--err)}
    .mreg-filtros{background:var(--card);border-radius:12px;padding:14px 18px;margin-bottom:20px;border:1px solid var(--border)}
    .mreg-filtros-ttl{font-family:var(--font-h);font-weight:700;font-size:11px;letter-spacing:2px;color:var(--amber);text-transform:uppercase;margin-bottom:12px}
    .mreg-count{font-size:12px;color:var(--muted);margin-top:10px}
    .mreg-count b{color:var(--text)}
    .mreg-table-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border)}
    .mreg-table{width:100%;border-collapse:collapse;font-size:13px;min-width:560px}
    .mreg-table thead tr{background:var(--amber)}
    .mreg-table thead th{padding:10px 12px;text-align:left;color:#000;font-family:var(--font-h);font-weight:700;font-size:12px;letter-spacing:.5px;white-space:nowrap}
    .mreg-table tbody tr{border-bottom:1px solid var(--border);transition:background .12s}
    .mreg-table tbody tr:hover{background:rgba(255,255,255,.03)}
    .mreg-table tbody tr:last-child{border-bottom:none}
    .mreg-table td{padding:9px 12px;color:var(--text);vertical-align:middle}
    .mreg-table td.ref{font-family:var(--font-h);font-weight:700;color:var(--amber2);letter-spacing:.5px}
    .mreg-empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px}
  </style>
</head>
<body>
<div id="root"></div>

<script>
/* Carga React de forma segura y arranca la app solo cuando todo está listo */
(function() {
  function loadScript(src, onload) {
    var s = document.createElement('script');
    s.src = src;
    s.onload = onload;
    s.onerror = function() {
      document.getElementById('root').innerHTML =
        '<div style="color:#f85149;font-family:sans-serif;padding:32px;text-align:center">' +
        '⚠ No se pudo cargar React.<br>Comprueba tu conexión a internet.</div>';
    };
    document.head.appendChild(s);
  }
  loadScript(
    'https://unpkg.com/react@18/umd/react.production.min.js',
    function() {
      loadScript(
        'https://unpkg.com/react-dom@18/umd/react-dom.production.min.js',
        function() { initApp(); }
      );
    }
  );
})();

function initApp() {
const {useState, useEffect, useRef, useCallback} = React;

/* ══════════════════════════════════════════════════════════
   CONFIGURATION — admin only
   Replace TU_URL_AQUI with the real Apps Script URL
   ══════════════════════════════════════════════════════════ */
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzK-WgNDMH3gfgwdvqJ0ewwhHQVT8FABk88PwKTqIfLknobN7Xb8P_YF5qxNJiA6FT1/exec";

/* ── DEMO DATA (used only if the Sheet does not respond) ── */
const COND_DEF  = [
  {codigo:"C001", nombre:"Juan García López"},
  {codigo:"C002", nombre:"Pedro Martínez Ruiz"},
  {codigo:"C003", nombre:"Miguel Ángel López"},
  {codigo:"C004", nombre:"Carlos Rodríguez Gil"},
];
const TRACT_DEF = ["9347-BKL","8823-FGH","7651-MNP","6234-QRS"];
const REMOL_DEF = ["RA-1234","RA-2345","RA-3456","RA-4567"];

/* ── ROUTES BY CLIENT ── */
const RUTAS = {
  "AMC": [
    "AMC → SUPERMARITIME",
    "SUPERMARITIME → AMC",
    "WHITE&GREEN → AMC",
    "AMC → WHITE&GREEN",
    "AMC → Lineage Vlissingen",
    "AMC → Kloosterboer",
  ],
  "White&Green": [
    "WHITE&GREEN → SUPERMARITIME",
    "SUPERMARITIME → WHITE&GREEN",
    "WHITE&GREEN → AMC",
  ],
};

/* Available destinations for SHORT type */
const DESTINOS_CORTO = [
  {id:"NAGEL",       label:"Nagel Bochum",              origen:false, destino:false},
  {id:"AH_ZW",       label:"AH Zwolle",                 origen:false, destino:false},
  {id:"AH_TI",  label:"AH Tilburg",            origen:false, destino:false},
  {id:"AH_LI",  label:"AH Limburg",            origen:false, destino:false},
  {id:"AH_DE",  label:"AH Delfgauw",           origen:false, destino:false},
  {id:"AH_TZ",  label:"AH Tilburg + Zwolle",   origen:false, destino:false},
  {id:"AH_TL",  label:"AH Tilburg + Limburg",  origen:false, destino:false},
  {id:"BIDONES",label:"Bidones",               origen:true,  destino:false},
  {id:"OTROS",  label:"Otros",                 origen:true,  destino:true},
];

/* Reference prefix */
const getPrefijo = (tipo, cliente) => {
  if (tipo === "Corto")                               return "OCZ";
  if (tipo === "Acarreo" && cliente === "AMC")        return "PLZ";
  // White&Green Haulage: no prefix, free alphanumeric field
  return null;
};

/* ── HELPERS ── */
const fmtNow = () => {
  const d = new Date(), p = n => String(n).padStart(2,"0");
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
};
const f2b64 = f => new Promise((ok,er) => {
  const r = new FileReader();
  r.onload = () => ok(r.result.split(",")[1]);
  r.onerror = er;
  r.readAsDataURL(f);
});
const isDemo = () => SCRIPT_URL.includes("TU_URL_AQUI");

/* ══════════════════════════════════════════════════════════
   HOOK: auto-load and refresh of lists from Sheet
   — Fully transparent to the driver —
   ══════════════════════════════════════════════════════════ */
function useLists() {
  const [lists,     setLists]     = useState({conductores:COND_DEF, tractoras:TRACT_DEF, remolques:REMOL_DEF});
  const [status,    setStatus]    = useState("idle");
  const [fromSheet, setFromSheet] = useState(false);

  const load = useCallback(async () => {
    if (isDemo()) return;
    setStatus("loading");
    const ctrl  = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 10000);
    try {
      const res  = await fetch(SCRIPT_URL, {method:"GET", mode:"cors", signal:ctrl.signal});
      const json = await res.json();
      if (json.conductores) {
        setLists({
          conductores: json.conductores.length ? json.conductores : COND_DEF,
          tractoras:   json.tractoras.length   ? json.tractoras   : TRACT_DEF,
          remolques:   json.remolques.length    ? json.remolques   : REMOL_DEF,
        });
        setFromSheet(true);
        setStatus("ok");
      } else { setStatus("error"); }
    } catch { setStatus("error"); }
    finally  { clearTimeout(timer); }
  }, []);

  /* Load on start + silent refresh every 5 minutes */
  useEffect(() => {
    load();
    const iv = setInterval(load, 5 * 60 * 1000);
    return () => clearInterval(iv);
  }, [load]);

  return {lists, status, fromSheet};
}

/* ── Pick button ── */
/* ── Autocomplete input con validación contra lista ── */
function AutocompleteInput({value, onChange, options, placeholder, hasError}) {
  const [query,  setQuery]  = React.useState(value || "");
  const [open,   setOpen]   = React.useState(false);
  const [hiIdx,  setHiIdx]  = React.useState(-1);
  const wrapRef = React.useRef(null);

  React.useEffect(() => { setQuery(value || ""); }, [value]);

  const filtered = query.trim() === ""
    ? options
    : options.filter(o => o.toLowerCase().includes(query.trim().toLowerCase()));

  const pick = (val) => {
    setQuery(val);
    onChange(val);
    setOpen(false);
    setHiIdx(-1);
  };

  const handleBlur = (e) => {
    if (wrapRef.current && wrapRef.current.contains(e.relatedTarget)) return;
    setOpen(false);
    if (!options.includes(query.trim())) onChange("");
    else onChange(query.trim());
  };

  const handleKey = (e) => {
    if (!open) { if (e.key === "ArrowDown" || e.key === "Enter") setOpen(true); return; }
    if (e.key === "ArrowDown")      { e.preventDefault(); setHiIdx(i => Math.min(i+1, filtered.length-1)); }
    else if (e.key === "ArrowUp")   { e.preventDefault(); setHiIdx(i => Math.max(i-1, 0)); }
    else if (e.key === "Enter")     { e.preventDefault(); if (hiIdx >= 0 && filtered[hiIdx]) pick(filtered[hiIdx]); }
    else if (e.key === "Escape")    { setOpen(false); setHiIdx(-1); }
  };

  const isValid = options.includes(query.trim());

  return React.createElement("div", {className:"ac-wrap", ref:wrapRef},
    React.createElement("input", {
      value: query,
      placeholder: placeholder || "Escribe para buscar…",
      className: hasError ? "er" : (!isValid && query.trim() !== "" ? "er" : ""),
      autoComplete: "off",
      onFocus: () => { setOpen(true); setHiIdx(-1); },
      onBlur:  handleBlur,
      onKeyDown: handleKey,
      onChange: e => {
        const v = e.target.value.toUpperCase();
        setQuery(v);
        setOpen(true);
        setHiIdx(-1);
        if (options.includes(v.trim())) onChange(v.trim());
        else onChange("");
      }
    }),
    open && React.createElement("div", {className:"ac-drop"},
      filtered.length === 0
        ? React.createElement("div", {className:"ac-empty"}, "Sin coincidencias")
        : filtered.map((opt, i) =>
            React.createElement("div", {
              key: opt,
              className: "ac-item" + (i === hiIdx ? " hi" : ""),
              onMouseDown: e => { e.preventDefault(); pick(opt); }
            }, opt)
          )
    )
  );
}

function Pick({label, sub, active, onClick}) {
  return React.createElement("div",
    {className:`pick${active?" on":""}`, onClick},
    React.createElement("div", {className:"pick-lbl"}, label),
    sub && React.createElement("div", {className:"pick-sub"}, sub)
  );
}

/* ── Bloque Conductor ── */
function ConductorBlock({codigo, nombre, onChange}) {
  const state = codigo==='' ? 'idle' : nombre ? 'valid' : 'error';
  return React.createElement("div", {className:`cond-block${state==='valid'?' valid':state==='error'?' error':''}`},
    React.createElement("div", {className:"cond-top"},
      React.createElement("div", {className:"cond-lbl-col"}, "Código"),
      React.createElement("input", {
        className:"cond-input", value:codigo, maxLength:10,
        placeholder:"C001", autoCapitalize:"characters", spellCheck:false,
        onChange: e => onChange(e.target.value.toUpperCase())
      }),
      React.createElement("div", {className:"cond-state"},
        state==='valid' && "✅",
        state==='error' && codigo.length>0 && "❌"
      )
    ),
    React.createElement("div", {className:"cond-bottom"},
      React.createElement("div", {className:"cond-avatar"}, nombre ? "👤" : "👥"),
      nombre
        ? React.createElement(React.Fragment, null,
            React.createElement("div", {className:"cond-name"}, nombre),
            React.createElement("div", {className:"cond-code-badge"}, codigo)
          )
        : React.createElement("div", {className:"cond-name empty"},
            codigo.length===0
              ? "Introduce tu código de conductor"
              : `Código "${codigo}" no encontrado`
          )
    )
  );
}

/* ══════════════════════════════════════════════════════════
   PANTALLA: Formulario
   ══════════════════════════════════════════════════════════ */
function FormScreen({lists, listsStatus, fromSheet, onOk, onMisRegistros}) {
  const {conductores, tractoras, remolques} = lists;

  const [form, setForm] = useState({
    codigo:"", nombre:"", tractora: (() => { const t = localStorage.getItem("pv_tractora")||""; return tractoras.includes(t)?t:""; })(), remolque:"",
    tipo:"",                          // "Acarreo" | "Corto"
    cliente:"", ruta:"",
    destCorto:"",                     // id del destino CORTO seleccionado
    origen:"", destino:"",            // campos libres para Bidones/Otros
    fechaCarga: fmtNow(), fechaDescarga:"",
    refRaw:"", refRaw2:"", comentarios:"", cmrFiles:[]
  });
  const [errs,     setErrs]     = useState({});
  const [refFocus, setRefFocus] = useState(false);
  const [busy,     setBusy]     = useState(false);
  const fileRef    = useRef(null);
  const submitting = useRef(false); // guardia síncrona anti-doble-envío
  const s = (k,v) => {
    if (k === "tractora" && v) localStorage.setItem("pv_tractora", v);
    setForm(f => ({...f, [k]:v}));
  };

  const onCodigo  = v => {
    const found = conductores.find(c => c.codigo === v.trim().toUpperCase());
    setForm(f => ({...f, codigo:v.toUpperCase(), nombre: found ? found.nombre : ""}));
  };
  /* Type change → reset everything that depends on it */
  const onTipo    = v => setForm(f => ({...f, tipo:v, cliente:"", ruta:"", destCorto:"", origen:"", destino:"", refRaw:"", refRaw2:""}));
  /* Client change → reset route and reference */
  const onCliente = v => setForm(f => ({...f, cliente:v, ruta:"", refRaw:"", refRaw2:""}));
  /* Route change → reset reference */
  const onRuta    = v => setForm(f => ({...f, ruta:v, refRaw:"", refRaw2:""}));
  /* Cambio de destino CORTO → limpiar origen/destino libres */
  const onDestCorto = v => setForm(f => ({
    ...f,
    destCorto: v,
    origen:    "",
    destino:   "",
    // clear refRaw if new destination does not need reference
    refRaw: (v === "BIDONES" || v === "OTROS") ? "" : f.refRaw
  }));

  /* Currently selected SHORT destination object */
  const destCortoObj = DESTINOS_CORTO.find(d => d.id === form.destCorto) || null;

  const rutasDisponibles = RUTAS[form.cliente] || [];
  const prefijo          = getPrefijo(form.tipo, form.cliente);
  const isRutaDobleRef  = form.tipo === "Acarreo" && form.cliente === "White&Green" && form.ruta === "WHITE&GREEN → AMC";
  const getReference    = () => {
    if (isRutaDobleRef) {
      const r1 = form.refRaw  ? "315712" + form.refRaw  : "";
      const r2 = form.refRaw2 ? "PLZ"    + form.refRaw2 : "";
      return (r1 && r2) ? r1 + " - " + r2 : r1 || r2;
    }
    return form.refRaw ? (prefijo ? prefijo + form.refRaw : form.refRaw) : "";
  };

  /* ── Validación ── */
  const validate = () => {
    const e = {};
    const now = fmtNow();

    if (!form.nombre)   e.codigo   = "Código de conductor no válido";
    if (!form.tractora || !tractoras.includes(form.tractora)) e.tractora = "Selecciona una tractora válida";
    if (!form.remolque || !remolques.includes(form.remolque)) e.remolque = "Selecciona un remolque válido";
    if (!form.tipo)     e.tipo     = "Selecciona el tipo de porte";

    if (form.tipo === "Acarreo") {
      if (!form.cliente) e.cliente = "Selecciona el cliente";
      if (!form.ruta)    e.ruta    = "Selecciona la ruta";
    }

    if (form.tipo === "Corto") {
      if (!form.destCorto) e.destCorto = "Selecciona el destino";
      if (destCortoObj?.origen  && !form.origen)  e.origen  = "Campo obligatorio";
      if (destCortoObj?.destino && !form.destino) e.destino = "Required field";
    }

    /* Fecha de carga: no puede ser futura */
    if (!form.fechaCarga) {
      e.fechaCarga = "Required";
    } else if (form.fechaCarga > now) {
      e.fechaCarga = "No puede ser posterior a la fecha/hora actual";
    }

    /* Fecha de descarga: no puede ser anterior a la de carga */
    if (!form.fechaDescarga) {
      e.fechaDescarga = "Required";
    } else if (form.fechaCarga && form.fechaDescarga < form.fechaCarga) {
      e.fechaDescarga = "No puede ser anterior a la fecha de carga";
    }

    /* CMR required */
    if (!form.cmrFiles || form.cmrFiles.length === 0) e.cmr = "Adjunta el CMR (foto o documento)";

    /* Reference */
    if (form.tipo === "Acarreo" && form.ruta) {
      if (form.cliente === "AMC") {
        const rutaLibre = form.ruta === "AMC → Lineage Vlissingen" || form.ruta === "AMC → Kloosterboer";
        if (rutaLibre) {
          if (!form.refRaw || form.refRaw.length < 10)
            e.ref = "Mínimo 10 caracteres";
          else if (form.refRaw.length > 30)
            e.ref = "Máximo 30 caracteres";
        } else {
          if (!form.refRaw || form.refRaw.length !== 7)
            e.ref = "Exactamente 7 dígitos (prefijo PLZ añadido automáticamente)";
          else if (!/^\d{7}$/.test(form.refRaw))
            e.ref = "Solo dígitos";
        }
      } else if (form.cliente === "White&Green") {
        if (isRutaDobleRef) {
          if (!form.refRaw || form.refRaw.length !== 4)
            e.ref = "Ref. WG: exactamente 4 dígitos tras el prefijo 315712";
          else if (!/^\d{4}$/.test(form.refRaw))
            e.ref = "Ref. WG: solo dígitos";
          if (!form.refRaw2 || form.refRaw2.length !== 7)
            e.ref2 = "Ref. AMC: exactamente 7 dígitos (prefijo PLZ añadido automáticamente)";
          else if (!/^\d{7}$/.test(form.refRaw2))
            e.ref2 = "Ref. AMC: solo dígitos";
        } else {
          if (!form.refRaw || form.refRaw.length < 10)
            e.ref = "Mínimo 10 caracteres";
          else if (form.refRaw.length > 50)
            e.ref = "Máximo 50 caracteres";
        }
      }
    }
    // Short: reference required only if destination is NOT Bidones or Otros
    if (form.tipo === "Corto" && form.destCorto &&
        form.destCorto !== "BIDONES" && form.destCorto !== "OTROS") {
      if (destCortoObj?.refLibre) {
        if (!form.refRaw || form.refRaw.length < 10)
          e.ref = "Mínimo 10 caracteres";
        else if (form.refRaw.length > 30)
          e.ref = "Máximo 30 caracteres";
      } else {
        if (!form.refRaw || form.refRaw.length !== 7)
          e.ref = "Exactamente 7 dígitos (prefijo OCZ añadido automáticamente)";
        else if (!/^\d{7}$/.test(form.refRaw))
          e.ref = "Solo dígitos";
      }
    }

    return e;
  };

  /* ── Envío ── */
  const handleSubmit = async () => {
    if (submitting.current) return;   // bloqueo síncrono inmediato
    const e = validate();
    setErrs(e);
    if (Object.keys(e).length > 0) return;
    submitting.current = true;
    setBusy(true);
    try {
      /* Convertir todos los archivos CMR a base64 */
      const cmrFiles = form.cmrFiles || [];
      const cmrItems = await Promise.all(cmrFiles.map(async (file, i) => ({
        cmrBase64: await f2b64(file),
        cmrType:   file.type,
        cmrName:   file.name,
        index:     i
      })));
      /* Build destination and route by type */
      const esCorto   = form.tipo === "Corto";
      const dObj      = DESTINOS_CORTO.find(d => d.id === form.destCorto);
      const destinoFinal = esCorto
        ? (dObj ? dObj.label + (form.origen ? ` (Origen: ${form.origen})` : "") + (form.destino ? ` / Destino: ${form.destino}` : "") : "-")
        : "-";

      const payload = {
        codigo:        form.codigo,
        nombre:        form.nombre,
        tractora:      form.tractora,
        remolque:      form.remolque,
        tipo:          form.tipo,
        destino:       destinoFinal,
        cliente:       form.tipo === "Acarreo" ? form.cliente : "AMC",
        ruta:          form.tipo === "Acarreo" ? form.ruta    : "-",
        fechaCarga:    form.fechaCarga.replace("T"," "),
        fechaDescarga: form.fechaDescarga.replace("T"," "),
        referencia:    getReference(),
        comentarios:   form.comentarios || "",
        cmrItems
      };

      /* Send completely in background — does not block or show errors to driver */
      if (!isDemo()) {
        fetch(SCRIPT_URL, {method:"POST", body:JSON.stringify(payload), mode:"no-cors"})
          .catch(() => {});
      }

      onOk({payload, demo: isDemo()});
      // no reseteamos submitting — la pantalla cambia a "success"
    } catch(err) {
      setErrs(ex => ({...ex, submit:"Error inesperado: " + err.message}));
      submitting.current = false;
      setBusy(false);
    }
  };

  const dotCls = listsStatus==="loading"?"loading":listsStatus==="ok"?"ok":listsStatus==="error"?"err":"idle";

  return React.createElement("div", {className:"app"},

    /* ── HEADER ── */
    React.createElement("div", {className:"hdr"},
      React.createElement("div", {className:"logo"}, "PORTES ", React.createElement("b",null,"VLISSINGEN")),
      React.createElement("div", {className:"hdr-right"},
        !isDemo() && React.createElement("div", {
          className:`sync-dot ${dotCls}`,
          title: listsStatus==="ok"      ? "Listas actualizadas desde Google Sheets"
               : listsStatus==="loading" ? "Actualizando listas..."
               : listsStatus==="error"   ? "Sin conexión — usando datos locales"
               : ""
        }),
        React.createElement("button", {
          className:"hdr-btn",
          onClick: onMisRegistros
        }, "📋 Mis Registros")
      )
    ),

    /* Banner solo en modo demo */
    isDemo() && React.createElement("div", {
      className:"banner warn",
      style:{margin:"12px 18px 0"}
    }, "⚠ Modo demo — configura SCRIPT_URL en el código"),

    React.createElement("div", {className:"body"},

      /* ── CONDUCTOR ── */
      React.createElement("div", {className:"sec"},
        React.createElement("div", {className:"sec-ttl"}, "Conductor"),
        React.createElement(ConductorBlock, {codigo:form.codigo, nombre:form.nombre, onChange:onCodigo}),
        errs.codigo && React.createElement("div",{className:"emsg",style:{marginTop:8}},"⚠ "+errs.codigo)
      ),

      /* ── VEHÍCULO ── */
      React.createElement("div", {className:"sec"},
        React.createElement("div", {className:"sec-ttl"}, "Vehículo",
          fromSheet && React.createElement("span",{className:"tag"},"Hoja ✓")
        ),
        React.createElement("div", {className:"row2"},
          React.createElement("div", {className:"fld"},
            React.createElement("label",null,"Tractora"),
            React.createElement(AutocompleteInput, {
              value:    form.tractora,
              options:  tractoras,
              placeholder: "Matrícula tractora…",
              hasError: !!errs.tractora,
              onChange: v => s("tractora", v)
            }),
            errs.tractora && React.createElement("div",{className:"emsg"},"⚠ "+errs.tractora)
          ),
          React.createElement("div", {className:"fld"},
            React.createElement("label",null,"Remolque"),
            React.createElement(AutocompleteInput, {
              value:    form.remolque,
              options:  remolques,
              placeholder: "Matrícula remolque…",
              hasError: !!errs.remolque,
              onChange: v => s("remolque", v)
            }),
            errs.remolque && React.createElement("div",{className:"emsg"},"⚠ "+errs.remolque)
          )
        )
      ),

      /* ── TIPO ── */
      React.createElement("div", {className:"sec"},
        React.createElement("div", {className:"sec-ttl"}, "Tipo de Porte"),
        React.createElement("div", {className:"pick-grid"},
          React.createElement(Pick, {label:"Acarreo", sub:"Carga completa", active:form.tipo==="Acarreo", onClick:()=>onTipo("Acarreo")}),
          React.createElement(Pick, {label:"Corto",   sub:"Entrega puntual", active:form.tipo==="Corto",   onClick:()=>onTipo("Corto")})
        ),
        errs.tipo && React.createElement("div",{className:"emsg",style:{marginTop:4}},"⚠ "+errs.tipo)
      ),

      /* ── HAULAGE: Client + Route ── */
      form.tipo === "Acarreo" && React.createElement(React.Fragment, null,
        React.createElement("div", {className:"sec"},
          React.createElement("div", {className:"sec-ttl"}, "Cliente"),
          React.createElement("div", {className:"pick-grid"},
            React.createElement(Pick, {label:"AMC",           active:form.cliente==="AMC",         onClick:()=>onCliente("AMC")}),
            React.createElement(Pick, {label:"White & Green", active:form.cliente==="White&Green",  onClick:()=>onCliente("White&Green")})
          ),
          errs.cliente && React.createElement("div",{className:"emsg",style:{marginTop:5}},"⚠ "+errs.cliente)
        ),
        form.cliente && React.createElement("div", {className:"sec"},
          React.createElement("div", {className:"sec-ttl"}, "Ruta"),
          React.createElement("div", {className:"pick-col"},
            rutasDisponibles.map(r =>
              React.createElement(Pick, {key:r, label:r, active:form.ruta===r, onClick:()=>onRuta(r)})
            )
          ),
          errs.ruta && React.createElement("div",{className:"emsg",style:{marginTop:5}},"⚠ "+errs.ruta)
        )
      ),

      /* ── SHORT: Destination + conditional fields ── */
      form.tipo === "Corto" && React.createElement("div", {className:"sec"},
        React.createElement("div", {className:"sec-ttl"}, "Destino"),
        React.createElement("div", {className:"pick-col"},
          DESTINOS_CORTO.map(d =>
            React.createElement(Pick, {key:d.id, label:d.label, active:form.destCorto===d.id, onClick:()=>onDestCorto(d.id)})
          )
        ),
        errs.destCorto && React.createElement("div",{className:"emsg",style:{marginTop:5}},"⚠ "+errs.destCorto),

        /* Campo ORIGEN — aparece para Bidones y Otros */
        destCortoObj?.origen && React.createElement("div",{className:"fld",style:{marginTop:14}},
          React.createElement("label",null,"Origen"),
          React.createElement("input",{
            value:form.origen,
            placeholder:"Introduce el origen",
            className:errs.origen?"er":"",
            onChange:e=>s("origen",e.target.value)
          }),
          errs.origen && React.createElement("div",{className:"emsg"},"⚠ "+errs.origen)
        ),

        /* Campo DESTINO — aparece solo para Otros */
        destCortoObj?.destino && React.createElement("div",{className:"fld"},
          React.createElement("label",null,"Destino"),
          React.createElement("input",{
            value:form.destino,
            placeholder:"Introduce el destino",
            className:errs.destino?"er":"",
            onChange:e=>s("destino",e.target.value)
          }),
          errs.destino && React.createElement("div",{className:"emsg"},"⚠ "+errs.destino)
        )
      ),

      /* ── TIEMPOS ── */
      React.createElement("div", {className:"sec"},
        React.createElement("div", {className:"sec-ttl"}, "Tiempos"),
        React.createElement("div", {className:"row2"},
          /* F/H Carga — no puede ser futura */
          React.createElement("div", {className:"fld"},
            React.createElement("label",null,"Fecha/Hora Carga"),
            React.createElement("input",{
              type:"datetime-local",
              value:form.fechaCarga,
              max: fmtNow(),
              onChange: e => {
                const v = e.target.value;
                s("fechaCarga", v);
                /* If existing unloading is earlier than loading, clear it */
                if (form.fechaDescarga && v > form.fechaDescarga)
                  s("fechaDescarga","");
              },
              className: errs.fechaCarga?"er":"",
              style:{colorScheme:"dark"}
            }),
            errs.fechaCarga && React.createElement("div",{className:"emsg"},"⚠ "+errs.fechaCarga)
          ),
          /* F/H Descarga — no puede ser anterior a la carga */
          React.createElement("div", {className:"fld"},
            React.createElement("label",null,"Fecha/Hora Descarga"),
            React.createElement("input",{
              type:"datetime-local",
              value:form.fechaDescarga,
              min: form.fechaCarga || undefined,
              onChange: e => s("fechaDescarga", e.target.value),
              className: errs.fechaDescarga?"er":"",
              style:{colorScheme:"dark"}
            }),
            errs.fechaDescarga && React.createElement("div",{className:"emsg"},"⚠ "+errs.fechaDescarga)
          )
        )
      ),

      /* ── REFERENCIA ── */
      (form.tipo === "Acarreo" && form.ruta ||
       form.tipo === "Corto" && form.destCorto &&
         form.destCorto !== "BIDONES" && form.destCorto !== "OTROS" ||
       isRutaDobleRef) &&
      React.createElement("div", {className:"sec"},
        React.createElement("div", {className:"sec-ttl"}, "Referencia"),
        React.createElement("div", {className:"fld"},
          /* WHITE&GREEN → AMC: dos referencias */
          isRutaDobleRef
            ? React.createElement(React.Fragment, null,
                React.createElement("div", {className:"fld"},
                  React.createElement("label", null, "Ref. WG"),
                  React.createElement("div", {className:`ref-wrap${errs.ref?" er":""}`},
                    React.createElement("div", {className:"ref-pfx"}, "315712"),
                    React.createElement("input", {
                      value: form.refRaw,
                      inputMode: "numeric",
                      placeholder: "0000",
                      maxLength: 4,
                      onChange: e => s("refRaw", e.target.value.replace(/\D/g,"").slice(0,4)),
                    })
                  ),
                  errs.ref
                    ? React.createElement("div",{className:"emsg"},"⚠ "+errs.ref)
                    : form.refRaw.length === 4
                      ? React.createElement("div",{className:"ref-hint"}, "Referencia: 315712"+form.refRaw)
                      : null
                ),
                React.createElement("div", {className:"fld"},
                  React.createElement("label", null, "Ref. AMC"),
                  React.createElement("div", {className:`ref-wrap${errs.ref2?" er":""}`},
                    React.createElement("div", {className:"ref-pfx"}, "PLZ"),
                    React.createElement("input", {
                      value: form.refRaw2,
                      inputMode: "numeric",
                      placeholder: "0000000",
                      maxLength: 7,
                      onChange: e => s("refRaw2", e.target.value.replace(/\D/g,"").slice(0,7)),
                    })
                  ),
                  errs.ref2
                    ? React.createElement("div",{className:"emsg"},"⚠ "+errs.ref2)
                    : form.refRaw2.length === 7
                      ? React.createElement("div",{className:"ref-hint"}, "Referencia: PLZ"+form.refRaw2)
                      : null
                )
              )
            /* White&Green otras rutas, AMC rutas libres o Corto refLibre: campo libre alfanumérico sin prefijo */
            : (form.tipo === "Acarreo" && form.cliente === "White&Green") ||
          (form.tipo === "Acarreo" && form.cliente === "AMC" && (form.ruta === "AMC → Lineage Vlissingen" || form.ruta === "AMC → Kloosterboer")) ||
          destCortoObj?.refLibre
            ? React.createElement(React.Fragment, null,
                React.createElement("input",{
                  value: form.refRaw,
                  placeholder: form.cliente === "White&Green" ? "Mín. 10 · Máx. 50 caracteres" : "Mín. 10 · Máx. 30 caracteres",
                  maxLength: form.cliente === "White&Green" ? 50 : 30,
                  className: errs.ref?"er":"",
                  onChange: e => s("refRaw", e.target.value.slice(0, form.cliente === "White&Green" ? 50 : 30)),
                  onFocus: ()=>setRefFocus(true),
                  onBlur:  ()=>setRefFocus(false)
                }),
                React.createElement("div",{className:"char-c"}, form.refRaw.length+"/"+(form.cliente === "White&Green" ? 50 : 30))
              )
            /* AMC Acarreo y Cortos con OCZ: prefijo fijo + 7 dígitos */
            : React.createElement("div", {className:`ref-wrap${refFocus?" foc":""}${errs.ref?" er":""}`},
                React.createElement("div", {className:"ref-pfx"}, prefijo),
                React.createElement("input",{
                  value: form.refRaw,
                  inputMode: "numeric",
                  placeholder: "0000000",
                  maxLength: 7,
                  onChange: e => s("refRaw", e.target.value.replace(/\D/g,"").slice(0,7)),
                  onFocus: ()=>setRefFocus(true),
                  onBlur:  ()=>setRefFocus(false)
                })
              ),
          errs.ref
            ? React.createElement("div",{className:"emsg"},"⚠ "+errs.ref)
            : prefijo && form.refRaw.length === 7
              ? React.createElement("div",{className:"ref-hint"}, "Referencia: "+prefijo+form.refRaw)
              : null
        )
      ),

      /* ── COMENTARIOS ── */
      React.createElement("div", {className:"sec"},
        React.createElement("div", {className:"sec-ttl"}, "Comentarios / Observaciones"),
        React.createElement("div", {className:"fld"},
          React.createElement("textarea", {
            value: form.comentarios,
            placeholder: "Escriba cualquier comentario/información que quiera transmitir",
            maxLength: 500,
            onChange: e => s("comentarios", e.target.value)
          }),
          React.createElement("div", {className:"char-c"}, form.comentarios.length+"/500")
        )
      ),

      /* ── CMR (obligatorio) ── */
      React.createElement("div", {className:"sec"},
        React.createElement("div", {className:"sec-ttl"}, "CMR"),
        React.createElement("div", {className:`cmr${form.cmrFiles.length>0?" on":""}${errs.cmr?" er":""}`, onClick:()=>fileRef.current.click()},
          React.createElement("div",{className:"cmr-ic"}, form.cmrFiles.length>0 ? "📄" : "📷"),
          React.createElement("div",{className:"cmr-tx"},
            form.cmrFiles.length>0
              ? `${form.cmrFiles.length} archivo${form.cmrFiles.length>1?"s":""} adjunto${form.cmrFiles.length>1?"s":""} — toca para añadir más`
              : "Toca para seleccionar imagen, PDF o hacer una foto"
          ),
          form.cmrFiles.length>0 && React.createElement("div",{className:"cmr-nm"},
            form.cmrFiles.map((f,i) => React.createElement("div",{key:i},"✓ "+f.name))
          )
        ),
        React.createElement("input",{ref:fileRef, type:"file", style:{display:"none"},
          accept:"image/*,application/pdf", multiple:true,
          onChange:e=>{
            if(e.target.files && e.target.files.length>0) {
              const nuevos = Array.from(e.target.files);
              s("cmrFiles", [...form.cmrFiles, ...nuevos]);
              fileRef.current.value="";
            }
          }}),
        errs.cmr && React.createElement("div",{className:"emsg",style:{marginTop:8,justifyContent:"center"}},"⚠ "+errs.cmr),
        form.cmrFiles.length>0 && React.createElement("button",{className:"clr-btn",
          onClick:e=>{e.stopPropagation();s("cmrFiles",[]);if(fileRef.current)fileRef.current.value="";}},
          "✕ Quitar todos los archivos")
      ),

      errs.submit && React.createElement("div",{className:"emsg",style:{marginBottom:14,textAlign:"center"}},"⚠ "+errs.submit),
      React.createElement("button",{className:"sub-btn", onClick:handleSubmit, disabled:busy},
        busy ? "⏳ Enviando..." : "✓ Registrar Porte")
    )
  );
}

/* ══════════════════════════════════════════════════════════
   PANTALLA: Éxito
   ══════════════════════════════════════════════════════════ */
function SuccessScreen({result, onNew}) {
  const p = result?.payload || {};

    ["Conductor",  p.nombre],

    ["Remolque",   p.remolque],
    ["Tipo",       p.tipo],
    ["Destino",    p.destino && p.destino !== "-" ? p.destino : null],
    ["Cliente",    p.cliente && p.cliente !== "-" ? p.cliente : null],
    ["Ruta",       p.ruta    && p.ruta    !== "-" ? p.ruta    : null],
    ["Referencia", p.referencia && p.referencia !== "-" ? p.referencia : null],
    ["CMR",        p.cmrName || "—"],
  ].filter(([,v]) => v);

  return React.createElement("div", {className:"app"},
    React.createElement("div", {className:"hdr"},
      React.createElement("div",{className:"logo"},"✓ ",React.createElement("b",null,"REGISTRADO"))
    ),
    React.createElement("div", {className:"suc-body"},
      React.createElement("div",{className:"suc-ic"},"✅"),
      React.createElement("div",{className:"suc-ttl"},"¡PORTE REGISTRADO!"),
      React.createElement("div",{className:"suc-sub"},
        result?.demo
          ? "Modo demo — configura SCRIPT_URL en el código para guardar datos reales."

      ),

        rows.map(([k,v]) => React.createElement("div",{className:"suc-row",key:k},
          React.createElement("span",{className:"suc-k"},k),
          React.createElement("span",{className:"suc-v"},v)
        ))
      ),
      React.createElement("button",{className:"new-btn", onClick:onNew},"+ Nuevo Porte")
    )
  );
}

/* ══════════════════════════════════════════════════════════
   PANTALLA: Login Mis Registros
   ══════════════════════════════════════════════════════════ */
function LoginScreen({onOk, onVolver}) {
  const [codigo,   setCodigo]   = useState("");
  const [pin,      setPin]      = useState("");
  const [pinFocus, setPinFocus] = useState(false);
  const [busy,     setBusy]     = useState(false);
  const [err,      setErr]      = useState("");

  const handleLogin = async () => {
    if (busy) return;
    if (!codigo.trim() || pin.length !== 4) {
      setErr("Introduce tu código y un PIN de 4 dígitos.");
      return;
    }
    setBusy(true);
    setErr("");
    try {
      const res  = await fetch(SCRIPT_URL, {
        method: "POST",
        body:   JSON.stringify({ action:"login", codigo: codigo.trim().toUpperCase(), pin }),
        mode:   "cors"
      });
      const json = await res.json();
      if (json.status === "ok") {
        onOk({ nombre: json.nombre, isAdmin: json.isAdmin, registros: json.registros });
      } else {
        setErr(json.msg || "Código o PIN incorrecto.");
      }
    } catch(e) {
      setErr("Error de conexión. Inténtalo de nuevo.");
    } finally {
      setBusy(false);
    }
  };

  return React.createElement("div", {className:"app"},
    React.createElement("div", {className:"hdr"},
      React.createElement("div", {className:"logo"}, "PORTES ", React.createElement("b",null,"VLISSINGEN")),
      React.createElement("div", {className:"hdr-right"},
        React.createElement("button", {className:"hdr-btn", onClick: onVolver}, "← Volver")
      )
    ),
    React.createElement("div", {className:"login-body"},
      React.createElement("div", {className:"login-ic"}, "🔐"),
      React.createElement("div", {className:"login-ttl"}, "MIS REGISTROS"),
      React.createElement("div", {className:"login-sub"}, "Introduce tu código de conductor y tu PIN personal para acceder a tu historial."),
      React.createElement("div", {className:"sec"},
        React.createElement("div", {className:"fld"},
          React.createElement("label", null, "Código de conductor"),
          React.createElement("input", {
            value: codigo, maxLength:10, placeholder:"C001",
            autoCapitalize:"characters", spellCheck:false,
            style:{fontFamily:"var(--font-h)",fontSize:"20px",letterSpacing:"3px",textTransform:"uppercase"},
            onChange: e => { setCodigo(e.target.value.toUpperCase()); setErr(""); }
          })
        ),
        React.createElement("div", {className:"fld"},
          React.createElement("label", null, "PIN personal"),
          React.createElement("div", {className:`pin-wrap${pinFocus?" foc":""}${err?" er":""}`},
            React.createElement("div", {className:"pin-pfx"}, "PIN"),
            React.createElement("input", {
              type:"password", inputMode:"numeric", maxLength:4,
              placeholder:"••••", value:pin,
              onChange: e => { setPin(e.target.value.replace(/\D/g,"").slice(0,4)); setErr(""); },
              onFocus: ()=>setPinFocus(true),
              onBlur:  ()=>setPinFocus(false)
            })
          )
        ),
        err && React.createElement("div", {className:"login-err"}, "⚠ "+err),
        React.createElement("button", {
          className:"sub-btn", style:{marginTop:8},
          onClick: handleLogin, disabled: busy
        }, busy ? "⏳ Verificando..." : "→ Acceder")
      )
    )
  );
}

/* ══════════════════════════════════════════════════════════
   PANTALLA: Mis Registros
   ══════════════════════════════════════════════════════════ */
function MisRegistrosScreen({nombre, isAdmin, registros, onVolver}) {
  const [desde,       setDesde]       = useState("");
  const [hasta,       setHasta]       = useState("");
  const [condFiltro,  setCondFiltro]  = useState("");
  const [tractFiltro, setTractFiltro] = useState("");
  const [remFiltro,   setRemFiltro]   = useState("");
  const [tipoFiltro,  setTipoFiltro]  = useState("");
  const [rutaFiltro,  setRutaFiltro]  = useState("");
  const [refFiltro,   setRefFiltro]   = useState("");

  // Listas únicas para autocomplete (solo admin)
  const uniq = campo => [...new Set(registros.map(r => r[campo]||"").filter(Boolean))].sort();
  const conductores = isAdmin ? uniq("conductor") : [];
  const tractoras   = isAdmin ? uniq("tractora")  : [];
  const remolques   = isAdmin ? uniq("remolque")  : [];

  const limpiar = () => { setDesde(""); setHasta(""); setCondFiltro(""); setTractFiltro(""); setRemFiltro(""); setTipoFiltro(""); setRutaFiltro(""); setRefFiltro(""); };

  const hayFiltro = desde || hasta || condFiltro || tractFiltro || remFiltro || tipoFiltro || rutaFiltro || refFiltro;

  const filtrados = registros.filter(r => {
    // Filtro fecha — basado en fcarga
    if (desde || hasta) {
      const raw = (r.fcarga||"").trim().split(" ")[0];
      const [dd,mm,yyyy] = raw.split("/");
      const iso = (yyyy&&mm&&dd) ? yyyy+"-"+mm+"-"+dd : "";
      if (iso) {
        if (desde && iso < desde) return false;
        if (hasta && iso > hasta) return false;
      }
    }
    // Filtros admin
    if (isAdmin) {
      if (condFiltro  && !(r.conductor||"").toLowerCase().includes(condFiltro.toLowerCase()))  return false;
      if (tractFiltro && !(r.tractora ||"").toLowerCase().includes(tractFiltro.toLowerCase())) return false;
      if (remFiltro   && !(r.remolque ||"").toLowerCase().includes(remFiltro.toLowerCase()))   return false;
      if (tipoFiltro  && (r.tipo||"") !== tipoFiltro)                                          return false;
      if (rutaFiltro  && !(r.ruta    ||"").toLowerCase().includes(rutaFiltro.toLowerCase()))   return false;
      if (refFiltro   && !(r.ref     ||"").toLowerCase().includes(refFiltro.toLowerCase()))    return false;
    }
    return true;
  });

  const tipoTag = tipo => {
    if (!tipo) return "-";
    const col = tipo === "Acarreo" ? "var(--info)" : "var(--ok)";
    return React.createElement("span", {
      style:{background:"rgba(88,166,255,.1)",color:col,border:"1px solid currentColor",
             borderRadius:"5px",padding:"2px 7px",fontSize:"11px",fontFamily:"var(--font-h)",
             fontWeight:700,letterSpacing:".5px"}
    }, tipo);
  };

  const splitFecha = val => {
    const parts = (val||"").trim().split(" ");
    const fecha = parts[0] || "-";
    const hora  = parts[1] || "";
    return React.createElement("div", null,
      React.createElement("div", null, fecha),
      hora && React.createElement("div", {style:{fontSize:"11px",color:"var(--muted)",marginTop:"2px"}}, hora)
    );
  };

  const acInput = (label, value, setValue, lista) =>
    React.createElement("div", {className:"fld", style:{marginBottom:0}},
      React.createElement("label", null, label),
      React.createElement("div", {className:"ac-wrap"},
        React.createElement("input", {
          value, placeholder: "Todos",
          onChange: e => setValue(e.target.value)
        }),
        value && lista.filter(v => v.toLowerCase().includes(value.toLowerCase()) && v.toLowerCase() !== value.toLowerCase()).length > 0 &&
          React.createElement("div", {className:"ac-drop"},
            lista
              .filter(v => v.toLowerCase().includes(value.toLowerCase()))
              .map((v,i) => React.createElement("div", {
                key:i, className:"ac-item",
                onMouseDown: e => { e.preventDefault(); setValue(v); }
              }, v))
          )
      )
    );

  return React.createElement("div", {className:"app"},
    React.createElement("div", {className:"hdr"},
      React.createElement("div", {className:"logo"}, "📋 ", React.createElement("b",null, isAdmin ? "TODOS LOS REGISTROS" : "MIS REGISTROS")),
      React.createElement("div", {className:"hdr-right"},
        React.createElement("button", {className:"hdr-btn", onClick:onVolver}, "← Volver")
      )
    ),
    React.createElement("div", {className:"mreg-body"},

      React.createElement("div", {className:"mreg-welcome"},
        React.createElement("div", {className:"mreg-avatar"}, isAdmin ? "🔑" : "👤"),
        React.createElement("div", null,
          React.createElement("div", {className:"mreg-nombre"}, nombre),
          React.createElement("div", {className:"mreg-sub"}, registros.length + " registro" + (registros.length !== 1 ? "s" : "") + " en total")
        ),
        React.createElement("button", {className:"mreg-logout", onClick:onVolver}, "Cerrar sesión")
      ),

      React.createElement("div", {className:"mreg-filtros"},
        React.createElement("div", {className:"mreg-filtros-ttl"}, "Filtrar"),

        // Fechas — siempre visibles
        React.createElement("div", {className:"row2", style:{marginBottom: isAdmin ? 10 : 0}},
          React.createElement("div", {className:"fld",style:{marginBottom:0}},
            React.createElement("label", null, "Desde"),
            React.createElement("input", {type:"date", value:desde, onChange: e=>setDesde(e.target.value), style:{colorScheme:"dark"}})
          ),
          React.createElement("div", {className:"fld",style:{marginBottom:0}},
            React.createElement("label", null, "Hasta"),
            React.createElement("input", {type:"date", value:hasta, onChange: e=>setHasta(e.target.value), style:{colorScheme:"dark"}})
          )
        ),

        // Filtros admin
        isAdmin && React.createElement(React.Fragment, null,
          React.createElement("div", {className:"row2", style:{marginBottom:10}},
            acInput("Conductor", condFiltro,  setCondFiltro,  conductores),
            acInput("Tractora",  tractFiltro, setTractFiltro, tractoras)
          ),
          React.createElement("div", {className:"row2", style:{marginBottom:10}},
            acInput("Remolque",  remFiltro,   setRemFiltro,   remolques),
            React.createElement("div", {className:"fld", style:{marginBottom:0}},
              React.createElement("label", null, "Tipo"),
              React.createElement("select", {value:tipoFiltro, onChange:e=>setTipoFiltro(e.target.value)},
                React.createElement("option",{value:""},"Todos"),
                React.createElement("option",{value:"Acarreo"},"Acarreo"),
                React.createElement("option",{value:"Corto"},"Corto")
              )
            )
          ),
          React.createElement("div", {className:"row2"},
            React.createElement("div", {className:"fld", style:{marginBottom:0}},
              React.createElement("label", null, "Ruta"),
              React.createElement("input", {value:rutaFiltro, placeholder:"Todas", onChange:e=>setRutaFiltro(e.target.value)})
            ),
            React.createElement("div", {className:"fld", style:{marginBottom:0}},
              React.createElement("label", null, "Referencia"),
              React.createElement("input", {value:refFiltro, placeholder:"Todas", onChange:e=>setRefFiltro(e.target.value)})
            )
          )
        ),

        React.createElement("div", {className:"mreg-count", style:{marginTop:10}},
          "Mostrando ", React.createElement("b",null,filtrados.length),
          " de ", React.createElement("b",null,registros.length), " registros",
          hayFiltro && React.createElement("button", {
            onClick: limpiar,
            style:{marginLeft:10,background:"none",border:"none",color:"var(--amber)",cursor:"pointer",fontSize:"12px",fontFamily:"var(--font-b)"}
          }, "✕ Limpiar filtro")
        )
      ),

      filtrados.length === 0
        ? React.createElement("div", {className:"mreg-empty"}, "No hay registros para los filtros seleccionados.")
        : React.createElement("div", {className:"mreg-table-wrap"},
            React.createElement("table", {className:"mreg-table"},
              React.createElement("thead",null,
                React.createElement("tr",null,
                  React.createElement("th",null,"#"),
                  isAdmin && React.createElement("th",null,"Conductor"),
                  React.createElement("th",null,"F/H Carga"),
                  React.createElement("th",null,"Tractora / Remolque"),
                  React.createElement("th",null,"Tipo"),
                  React.createElement("th",null,"Ruta"),
                  React.createElement("th",null,"Referencia")
                )
              ),
              React.createElement("tbody",null,
                filtrados.map((r,i) =>
                  React.createElement("tr",{key:i},
                    React.createElement("td",{style:{color:"var(--muted)",fontSize:"12px"}}, filtrados.length - i),
                    isAdmin && React.createElement("td",{style:{fontWeight:600}}, r.conductor || "-"),
                    React.createElement("td",null, splitFecha(r.fcarga)),
                    React.createElement("td",null,
                      React.createElement("div",null, r.tractora || "-"),
                      React.createElement("div",{style:{fontSize:"11px",color:"var(--muted)",marginTop:"2px"}}, r.remolque || "-")
                    ),
                    React.createElement("td",null, tipoTag(r.tipo)),
                    React.createElement("td",null, r.ruta && r.ruta !== "-" ? r.ruta : React.createElement("span",{style:{color:"var(--muted)"}},"-")),
                    React.createElement("td",{className:"ref"}, r.ref || React.createElement("span",{style:{color:"var(--muted)",fontFamily:"var(--font-b)",fontWeight:400}},"-"))
                  )
                )
              )
            )
          )
    )
  );
}

/* ══════════════════════════════════════════════════════════
   ROOT
   ══════════════════════════════════════════════════════════ */
function App() {
  const [screen,    setScreen]    = useState("form");
  const [result,    setResult]    = useState(null);
  const [sesion,    setSesion]    = useState(null); // { nombre, registros }
  const {lists, status, fromSheet} = useLists();

  if (screen === "success")
    return React.createElement(SuccessScreen, {
      result,
      onNew: () => { setResult(null); setScreen("form"); }
    });

  if (screen === "login")
    return React.createElement(LoginScreen, {
      onOk:    s => { setSesion(s); setScreen("misregistros"); },
      onVolver: () => setScreen("form")
    });

  if (screen === "misregistros" && sesion)
    return React.createElement(MisRegistrosScreen, {
      nombre:    sesion.nombre,
      isAdmin:   sesion.isAdmin,
      registros: sesion.registros,
      onVolver:  () => { setSesion(null); setScreen("form"); }
    });

  return React.createElement(FormScreen, {
    lists,
    listsStatus: status,
    fromSheet,
    onOk:           r => { setResult(r); setScreen("success"); },
    onMisRegistros: () => setScreen("login")
  });
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
} // end initApp
</script>
</body>
</html>
