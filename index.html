<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#0d1117"/>
  <title>Portes Vlissingen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    /* Estilos consolidados y optimizados */
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#0d1117;--card:#161b22;--card2:#1c2230;--border:#30363d;
      --amber:#f0a500;--amber2:#fbbf24;--text:#e6edf3;--muted:#7d8590;
      --err:#f85149;--ok:#3fb950;--info:#58a6ff;
      --font-h:'Barlow Condensed',sans-serif;--font-b:'Barlow',sans-serif;
    }
    html,body{height:100%;background:var(--bg);overscroll-behavior-y: contain;}
    .app{min-height:100vh;background:var(--bg);font-family:var(--font-b);color:var(--text);font-size:15px}
    .hdr{background:var(--card);border-bottom:2px solid var(--amber);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99}
    .logo{font-family:var(--font-h);font-weight:800;font-size:20px;letter-spacing:2px;color:var(--amber)}
    .logo b{color:var(--text);font-weight:800}
    .hdr-right{display:flex;align-items:center;gap:8px}
    .cfg-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:7px 13px;color:var(--muted);font-size:12px;cursor:pointer;font-family:var(--font-b);display:flex;align-items:center;gap:5px}
    .cfg-btn:hover{border-color:var(--amber);color:var(--amber)}
    .reload-btn{background:none;border:1px solid var(--border);border-radius:7px;padding:6px 11px;color:var(--muted);font-size:11px;cursor:pointer}
    .reload-btn:hover{border-color:var(--info);color:var(--info)}
    .sync-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .sync-dot.ok{background:var(--ok)}.sync-dot.err{background:var(--err)}.sync-dot.idle{background:var(--muted)}.sync-dot.loading{background:var(--amber);animation:pulse 1s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    .body{padding:18px;max-width:520px;margin:0 auto;padding-bottom:90px}
    .banner{border-radius:10px;padding:10px 14px;font-size:12px;margin-bottom:18px;text-align:center}
    .banner.warn{background:rgba(240,165,0,.08);border:1px solid rgba(240,165,0,.25);color:var(--amber)}
    .banner.ok{background:rgba(63,185,80,.08);border:1px solid rgba(63,185,80,.25);color:var(--ok)}
    .sec{margin-bottom:26px}
    .sec-ttl{font-family:var(--font-h);font-weight:700;font-size:12px;letter-spacing:3px;color:var(--amber);text-transform:uppercase;margin-bottom:13px;display:flex;align-items:center;gap:9px}
    .sec-ttl::before{content:'';display:block;width:3px;height:16px;background:var(--amber);border-radius:2px;flex-shrink:0}
    .fld{margin-bottom:14px}
    .fld label{display:block;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:5px}
    .fld input,.fld select{width:100%;background:var(--card2);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:var(--font-b);font-size:15px;outline:none}
    .fld input:focus,.fld select:focus{border-color:var(--amber)}
    .fld input.er,.fld select.er{border-color:var(--err)}
    .fld select option{background:#1c2230}
    .emsg{color:var(--err);font-size:11px;margin-top:5px;display:flex;align-items:center;gap:4px}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
    .cond-block{border-radius:12px;overflow:hidden;border:1.5px solid var(--border);transition:border-color .3s;margin-bottom:0; background: var(--card2);}
    .cond-block.valid{border-color:var(--ok)}
    .cond-block.error{border-color:var(--err)}
    .cond-top{display:flex;align-items:center}
    .cond-lbl-col{width:72px;flex-shrink:0;padding:0 14px;font-family:var(--font-h);font-weight:700;font-size:11px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;border-right:1px solid var(--border);display:flex;align-items:center;height:52px}
    .cond-input{flex:1;background:transparent;border:none;padding:13px 14px;color:var(--text);font-family:var(--font-h);font-weight:700;font-size:20px;letter-spacing:3px;outline:none;text-transform:uppercase;width:100%}
    .cond-bottom{border-top:1px solid var(--border);padding:12px 14px;display:flex;align-items:center;gap:10px;min-height:52px}
    .cond-avatar{width:32px;height:32px;border-radius:50%;background:rgba(240,165,0,.15);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
    .cond-name{font-size:15px;font-weight:600;color:var(--text)}
    .cond-name.empty{color:var(--muted);font-weight:400;font-size:13px}
    .cond-code-badge{margin-left:auto;font-family:var(--font-h);font-size:12px;color:var(--ok);background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.3);border-radius:5px;padding:2px 8px;letter-spacing:1px;flex-shrink:0}
    .pick-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    .pick{background:var(--card2);border:1.5px solid var(--border);border-radius:10px;padding:13px 10px;text-align:center;cursor:pointer;transition:all .18s;user-select:none}
    .pick.on{border-color:var(--amber);background:rgba(240,165,0,.1)}
    .pick-icon{font-size:22px;margin-bottom:5px}
    .pick-lbl{font-family:var(--font-h);font-weight:700;font-size:15px;letter-spacing:.5px}
    .pick-sub{font-size:11px;color:var(--muted);margin-top:2px}
    .ref-wrap{display:flex;background:var(--card2);border:1.5px solid var(--border);border-radius:10px;overflow:hidden}
    .ref-wrap.foc{border-color:var(--amber)}.ref-wrap.er{border-color:var(--err)}
    .ref-pfx{padding:12px 13px;background:rgba(240,165,0,.12);color:var(--amber2);font-family:var(--font-h);font-weight:700;font-size:16px;border-right:1px solid var(--border);white-space:nowrap}
    .ref-wrap input{border:none;border-radius:0;background:transparent;flex:1;min-width:0;padding:12px 14px;color:var(--text);font-family:var(--font-b);font-size:15px;outline:none}
    .cmr{border:2px dashed var(--border);border-radius:12px;padding:26px 16px;text-align:center;cursor:pointer;transition:all .2s}
    .cmr.on{border-color:var(--amber);background:rgba(240,165,0,.04)}
    .cmr.er{border-color:var(--err)}
    .cmr-ic{font-size:32px;margin-bottom:8px}
    .cmr-tx{color:var(--muted);font-size:13px;line-height:1.5}
    .cmr-nm{color:var(--amber2);font-weight:600;margin-top:7px;font-size:13px;word-break:break-all}
    .sub-btn{width:100%;background:var(--amber);color:#000;font-family:var(--font-h);font-weight:800;font-size:19px;letter-spacing:2px;padding:17px;border:none;border-radius:13px;cursor:pointer;transition:all .2s;text-transform:uppercase}
    .sub-btn:hover{background:var(--amber2)}.sub-btn:disabled{opacity:.45;cursor:not-allowed}
    .new-btn{width:100%;background:var(--amber);color:#000;font-family:var(--font-h);font-weight:800;font-size:17px;letter-spacing:2px;padding:17px;border:none;border-radius:13px;cursor:pointer}
    .save-btn{width:100%;background:var(--amber);color:#000;font-family:var(--font-h);font-weight:800;font-size:17px;letter-spacing:1px;padding:15px;border:none;border-radius:11px;cursor:pointer}
    .copy-btn{width:100%;background:var(--card2);border:1.5px solid var(--amber);color:var(--amber);font-family:var(--font-h);font-weight:700;font-size:15px;letter-spacing:1px;padding:13px;border-radius:11px;cursor:pointer;margin-bottom:10px}
    .back-btn{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;padding:0;margin-bottom:22px;font-family:var(--font-b)}
    .cfg-card{background:var(--card);border-radius:14px;padding:20px;border:1px solid var(--border);margin-bottom:14px}
    .cfg-card h3{font-family:var(--font-h);font-weight:700;font-size:17px;margin-bottom:7px}
    .cfg-card p{color:var(--muted);font-size:13px;line-height:1.65;margin-bottom:14px}
    .cfg-url-input{width:100%;background:#0d1117;border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:13px;outline:none;margin-bottom:14px;font-family:monospace;display:block}
    .code-blk{background:#090d12;border:1px solid var(--border);border-radius:10px;padding:14px;font-family:monospace;font-size:11px;color:#8b949e;overflow:auto;white-space:pre;line-height:1.6;max-height:260px;margin-bottom:14px}
    .suc-body{padding:36px 22px;max-width:480px;margin:0 auto;text-align:center}
    .suc-ttl{font-family:var(--font-h);font-weight:800;font-size:30px;letter-spacing:2px;color:var(--ok);margin-bottom:10px}
    .suc-data{background:var(--card);border-radius:13px;padding:18px;text-align:left;margin-bottom:28px;border:1px solid var(--border)}
    .suc-row{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;gap:8px}
    .suc-row:last-child{border-bottom:none}
    .suc-k{color:var(--muted);flex-shrink:0}
    .suc-v{font-weight:600;text-align:right;word-break:break-all}
    .tag{display:inline-block;background:rgba(88,166,255,.1);color:var(--info);border:1px solid rgba(88,166,255,.25);border-radius:5px;padding:2px 8px;font-size:11px;font-family:var(--font-h);font-weight:600}
    .char-c{font-size:11px;color:var(--muted);margin-top:3px;text-align:right}
    .clr-btn{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;margin-top:7px;display:block;width:100%}
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
const {useState, useEffect, useRef, useCallback} = React;

/* --- DATOS POR DEFECTO --- */
const COND_DEF = [{codigo:"C001", nombre:"Juan García López"}, {codigo:"C002", nombre:"Pedro Martínez Ruiz"}];
const TRACT_DEF = ["9347-BKL","8823-FGH"];
const REMOL_DEF = ["RA-1234","RA-2345"];
const DESTINOS = ["ALBERT HEIJN ZWOLLE","ALBERT HEIJN TILBURG","ALBERT HEIJN LIMBURG","ALBERT HEIJN DELFGAUW","NAGEL BOCHUM"];

/* --- CODIGO APPS SCRIPT --- */
const SCRIPT_CODE = `function doGet(e) {
  var ss = SpreadsheetApp.getActiveSpreadsheet();
  function readCol1(sheetName) {
    var sh = ss.getSheetByName(sheetName);
    if (!sh || sh.getLastRow() < 2) return [];
    return sh.getRange(2, 1, sh.getLastRow()-1, 1).getValues().map(r => r[0]).filter(v => v != "");
  }
  function readConductores() {
    var sh = ss.getSheetByName("Conductores");
    if (!sh || sh.getLastRow() < 2) return [];
    return sh.getRange(2, 1, sh.getLastRow()-1, 2).getValues().filter(r => r[0] != "").map(r => ({codigo: String(r[0]).trim().toUpperCase(), nombre: String(r[1]).trim()}));
  }
  var result = { conductores: readConductores(), tractoras: readCol1("Tractoras"), remolques: readCol1("Remolques") };
  return ContentService.createTextOutput(JSON.stringify(result)).setMimeType(ContentService.MimeType.JSON);
}

function doPost(e) {
  try {
    var data = JSON.parse(e.postData.contents);
    var ss = SpreadsheetApp.getActiveSpreadsheet();
    var sheet = ss.getSheetByName("Portes");
    if (!sheet) {
      sheet = ss.insertSheet("Portes");
      sheet.appendRow(["FECHA REG.","CODIGO","CONDUCTOR","TRACTORA","REMOLQUE","TIPO","DESTINO","CLIENTE","RUTA","F/H CARGA","F/H DESCARGA","REFERENCIA","CMR"]);
      sheet.setFrozenRows(1);
    }
    var cmrLink = "";
    if (data.cmrBase64 && data.cmrName) {
      var bytes = Utilities.base64Decode(data.cmrBase64);
      var blob = Utilities.newBlob(bytes, data.cmrType || "application/octet-stream", data.cmrName);
      var folder = DriveApp.getFolderById("TU_FOLDER_ID_AQUI"); // <-- REEMPLAZAR
      var file = folder.createFile(blob);
      file.setSharing(DriveApp.Access.ANYONE_WITH_LINK, DriveApp.Permission.VIEW);
      cmrLink = file.getUrl();
    }
    sheet.appendRow([new Date().toLocaleString("es-ES"), data.codigo, data.nombre, data.tractora, data.remolque, data.tipo, data.destino || "-", data.cliente, data.ruta, data.fechaCarga, data.fechaDescarga, data.referencia, cmrLink]);
    return ContentService.createTextOutput(JSON.stringify({status:"ok"})).setMimeType(ContentService.MimeType.JSON);
  } catch(err) {
    return ContentService.createTextOutput(JSON.stringify({status:"error", msg:err.toString()})).setMimeType(ContentService.MimeType.JSON);
  }
}`;

/* --- HELPERS --- */
const fmtNow = () => {
  const d = new Date(), p = n => String(n).padStart(2,"0");
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
};
const f2b64 = f => new Promise((ok,er) => {
  const r = new FileReader();
  r.onload = () => ok(r.result.split(",")[1]);
  r.onerror = er;
  r.readAsDataURL(f);
});

/* --- COMPONENTES --- */
function Pick({label, icon, sub, active, onClick}) {
  return React.createElement("div", {className:`pick${active?" on":""}`, onClick},
    icon && React.createElement("div", {className:"pick-icon"}, icon),
    React.createElement("div", {className:"pick-lbl"}, label),
    sub && React.createElement("div", {className:"pick-sub"}, sub)
  );
}

function FormScreen({scriptUrl, lists, status, onReload, onCfg, onOk}) {
  const [form, setForm] = useState({
    codigo:"", nombre:"", tractora:"", remolque:"", tipo:"", destino:"", cliente:"", ruta:"",
    fechaCarga: fmtNow(), fechaDescarga:"", refRaw:"", cmrFile: null
  });
  const [errs, setErrs] = useState({});
  const [busy, setBusy] = useState(false);
  const fileRef = useRef(null);
  const s = (k,v) => setForm(f => ({...f, [k]:v}));

  const onCodigo = v => {
    const found = lists.conductores.find(c => c.codigo === v.toUpperCase());
    setForm(f => ({...f, codigo: v.toUpperCase(), nombre: found ? found.nombre : ""}));
  };

  const getReferencia = () => {
    if (form.cliente !== "AMC") return form.refRaw;
    const p = form.tipo === "Corto" ? "OCZ" : form.tipo === "Acarreo" ? "PLZ" : "";
    return p + form.refRaw;
  };

  const handleSubmit = async () => {
    const e = {};
    if (!form.nombre) e.codigo = "No válido";
    if (!form.tractora) e.tractora = "Req";
    if (!form.cmrFile) e.cmr = "Req";
    if (form.cliente === "AMC" && !/^\d{7}$/.test(form.refRaw)) e.ref = "7 dígitos";
    setErrs(e);
    if (Object.keys(e).length > 0) return;

    setBusy(true);
    try {
      let b64 = await f2b64(form.cmrFile);
      const payload = { ...form, referencia: getReferencia(), cmrBase64: b64, cmrName: form.cmrFile.name, cmrType: form.cmrFile.type };
      if (scriptUrl) await fetch(scriptUrl, {method:"POST", body:JSON.stringify(payload), mode:"no-cors"});
      onOk(payload);
    } catch(err) { alert("Error: " + err.message); } finally { setBusy(false); }
  };

  return React.createElement("div", {className:"app"},
    React.createElement("div", {className:"hdr"},
      React.createElement("div", {className:"logo"}, "PORTES ", React.createElement("b",null,"VLISSINGEN")),
      React.createElement("div", {className:"hdr-right"},
        React.createElement("div", {className:`sync-dot ${status}`}),
        React.createElement("button", {className:"reload-btn", onClick:onReload}, "↺"),
        React.createElement("button", {className:"cfg-btn", onClick:onCfg}, "⚙")
      )
    ),
    React.createElement("div", {className:"body"},
      React.createElement("div", {className:"sec"},
        React.createElement("div", {className:"sec-ttl"}, "Conductor"),
        React.createElement("div", {className:`cond-block ${form.nombre?"valid":form.codigo?"error":""}`},
          React.createElement("div", {className:"cond-top"},
            React.createElement("div", {className:"cond-lbl-col"}, "ID"),
            React.createElement("input", {className:"cond-input", value:form.codigo, onChange:e=>onCodigo(e.target.value), placeholder:"C001"})
          ),
          React.createElement("div", {className:"cond-bottom"},
            React.createElement("div", {className:"cond-avatar"}, "👤"),
            React.createElement("div", {className:"cond-name"}, form.nombre || "Introduce código")
          )
        )
      ),
      React.createElement("div", {className:"sec"},
        React.createElement("div", {className:"sec-ttl"}, "Vehículo"),
        React.createElement("div", {className:"row2"},
          React.createElement("div", {className:"fld"},
            React.createElement("label", null, "Tractora"),
            React.createElement("select", {value:form.tractora, onChange:e=>s("tractora",e.target.value)},
              React.createElement("option",{value:""},"-"),
              lists.tractoras.map(t => React.createElement("option",{key:t,value:t},t))
            )
          ),
          React.createElement("div", {className:"fld"},
            React.createElement("label", null, "Remolque"),
            React.createElement("select", {value:form.remolque, onChange:e=>s("remolque",e.target.value)},
              React.createElement("option",{value:""},"-"),
              lists.remolques.map(r => React.createElement("option",{key:r,value:r},r))
            )
          )
        )
      ),
      React.createElement("div",{className:"sec"},
        React.createElement("div",{className:"sec-ttl"},"CMR"),
        React.createElement("div",{className:`cmr ${form.cmrFile?"on":""}`, onClick:()=>fileRef.current.click()},
          React.createElement("div",{className:"cmr-ic"},"📷"),
          React.createElement("div",{className:"cmr-tx"},form.cmrFile ? form.cmrFile.name : "Toca para foto/archivo")
        ),
        React.createElement("input",{ref:fileRef, type:"file", style:{display:"none"}, accept:"image/*", capture:"environment", onChange:e=>s("cmrFile", e.target.files[0])})
      ),
      React.createElement("button", {className:"sub-btn", onClick:handleSubmit, disabled:busy}, busy?"Enviando...":"Registrar Porte")
    )
  );
}

function SuccessScreen({onNew}) {
  return React.createElement("div", {className:"app"},
    React.createElement("div", {className:"suc-body"},
      React.createElement("div", {className:"suc-ttl"}, "¡ENVIADO!"),
      React.createElement("button", {className:"new-btn", onClick:onNew}, "Diligenciar Otro")
    )
  );
}

function ConfigScreen({url, onSave, onBack}) {
  const [val, setVal] = useState(url);
  const onCopy = () => { navigator.clipboard.writeText(SCRIPT_CODE); alert("Copiado"); };
  return React.createElement("div", {className:"app", style:{padding:20}},
    React.createElement("button", {className:"back-btn", onClick:onBack}, "← Volver"),
    React.createElement("div", {className:"cfg-card"},
      React.createElement("h3", null, "Google Script URL"),
      React.createElement("input", {className:"cfg-url-input", value:val, onChange:e=>setVal(e.target.value)}),
      React.createElement("button", {className:"save-btn", onClick:()=>onSave(val)}, "Guardar URL")
    ),
    React.createElement("div", {className:"cfg-card"},
      React.createElement("h3", null, "Código Script"),
      React.createElement("div", {className:"code-blk"}, SCRIPT_CODE),
      React.createElement("button", {className:"copy-btn", onClick:onCopy}, "Copiar Código")
    )
  );
}

function App() {
  const [screen, setScreen] = useState("form");
  const [scriptUrl, setScriptUrl] = useState(localStorage.getItem("portes_url") || "");
  const [lists, setLists] = useState({conductores:COND_DEF, tractoras:TRACT_DEF, remolques:REMOL_DEF});
  const [status, setStatus] = useState("idle");

  const loadLists = useCallback(async () => {
    if (!scriptUrl) return;
    setStatus("loading");
    try {
      const res = await fetch(scriptUrl);
      const data = await res.json();
      setLists(data);
      setStatus("ok");
    } catch { setStatus("err"); }
  }, [scriptUrl]);

  useEffect(() => { loadLists(); }, [loadLists]);

  const saveUrl = url => {
    localStorage.setItem("portes_url", url);
    setScriptUrl(url);
    setScreen("form");
  };

  if (screen === "success") return React.createElement(SuccessScreen, {onNew:()=>setScreen("form")});
  if (screen === "config") return React.createElement(ConfigScreen, {url:scriptUrl, onSave:saveUrl, onBack:()=>setScreen("form")});
  return React.createElement(FormScreen, {scriptUrl, lists, status, onReload:loadLists, onCfg:()=>setScreen("config"), onOk:()=>setScreen("success")});
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
